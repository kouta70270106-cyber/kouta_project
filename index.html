<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冒険者ギルド 登録所</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(ellipse at center, #0a1a0a 0%, #040a04 100%);
      min-height: 100vh;
      color: #c8d4c0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .guild-card {
      background: linear-gradient(135deg, #0c1810 0%, #142018 100%);
      border: 2px solid #3a6a48;
      border-radius: 12px;
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 60px rgba(58,106,72,0.25);
      position: relative;
    }
    .corner { position: absolute; width: 18px; height: 18px; border-color: #c0a850; border-style: solid; }
    .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }
    .guild-emblem { text-align: center; font-size: 48px; margin-bottom: 8px; }
    .guild-title { text-align: center; font-size: 26px; font-weight: bold; color: #c0a850; margin-bottom: 4px; }
    .guild-sub { text-align: center; font-size: 11px; color: #5a7a62; letter-spacing: 3px; margin-bottom: 8px; }
    .divider { text-align: center; color: #3a6a48; font-size: 11px; letter-spacing: 5px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 10px; color: #7a9a82; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 14px;
      background: #060e08; border: 1px solid #1e3020; border-radius: 6px;
      color: #c0d4c0; font-size: 14px; font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: #3a4a3c; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #4a8a60; }
    .form-select option { background: #0c1810; }
    .form-textarea { resize: vertical; min-height: 90px; }
    .char-count { font-size: 10px; color: #445544; text-align: right; margin-top: 3px; }
    .submit-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #162a1e, #223a28);
      border: 1px solid #4a8a60; border-radius: 6px;
      color: #88cc99; font-size: 15px; font-weight: bold;
      cursor: pointer; letter-spacing: 1px; margin-top: 6px;
    }
    .submit-btn:hover { background: linear-gradient(135deg, #223a28, #2e4e34); }
    #result-section { display: none; text-align: center; }
    .success-title { font-size: 20px; color: #c0a850; font-weight: bold; margin-bottom: 4px; }
    .success-sub { font-size: 12px; color: #5a7a62; margin-bottom: 24px; }
    .adv-card {
      background: linear-gradient(160deg, #0a1a10, #142018);
      border: 2px solid #c0a850; border-radius: 10px;
      padding: 28px 24px 20px; position: relative; margin-bottom: 20px;
    }
    .adv-rank {
      position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(90deg, #a08030, #c0a850, #a08030);
      color: #0c0c08; font-size: 10px; font-weight: bold;
      padding: 3px 14px; border-radius: 10px; white-space: nowrap;
    }
    .adv-icon { font-size: 56px; margin-bottom: 10px; }
    .adv-name { font-size: 26px; font-weight: bold; color: #ffd700; margin-bottom: 4px; }
    .adv-job { font-size: 14px; color: #88cc99; margin-bottom: 14px; }
    .adv-divider { border: none; border-top: 1px solid #1e3020; margin-bottom: 14px; }
    .adv-bio { font-size: 13px; color: #a0b098; line-height: 1.7; font-style: italic; }
    .adv-id { margin-top: 16px; font-size: 10px; color: #3a5040; }
    .stars { color: #c0a850; font-size: 13px; margin-bottom: 20px; }
    .game-btn {
      display: block; width: 100%; padding: 18px;
      background: linear-gradient(135deg, #1a4a10, #2a6a18);
      border: 2px solid #5aaa40; border-radius: 8px;
      color: #ccff99; font-size: 18px; font-weight: bold;
      text-decoration: none; text-align: center;
      margin-bottom: 12px;
      box-shadow: 0 0 24px rgba(90,170,60,0.35);
    }
    .game-btn:hover { background: linear-gradient(135deg, #2a6a18, #3a8a28); }
    .board-btn {
      display: block; width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1a1a3a, #2a2a5a);
      border: 2px solid #5a6aaa; border-radius: 8px;
      color: #aabbff; font-size: 16px; font-weight: bold;
      text-decoration: none; text-align: center;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .board-btn:hover { background: linear-gradient(135deg, #2a2a5a, #3a3a7a); }
    .back-btn {
      background: none; border: 1px solid #2a4a32;
      color: #5a7a62; padding: 8px 20px; border-radius: 4px;
      cursor: pointer; font-size: 12px;
    }
    .back-btn:hover { border-color: #4a8a60; color: #88cc99; }
    .existing-banner {
      background: #0a1a10; border: 1px solid #3a6a48; border-radius: 6px;
      padding: 10px 14px; margin-bottom: 20px;
      font-size: 12px; color: #88cc99;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .existing-banner button {
      background: #162a1e; border: 1px solid #3a6a48; border-radius: 4px;
      color: #88cc99; font-size: 11px; padding: 4px 10px; cursor: pointer; white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="guild-card">
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>

  <div id="form-section">
    <div class="guild-emblem">⚜️</div>
    <div class="guild-title">冒険者ギルド</div>
    <div class="guild-sub">ADVENTURER GUILD</div>
    <div class="divider">✦ 登録所 ✦</div>

    <div id="existing-banner" class="existing-banner" style="display:none">
      <span id="existing-text"></span>
      <button onclick="goToBoard()">本部へ →</button>
    </div>

    <form id="reg-form" novalidate>
      <div class="form-group">
        <label class="form-label">⚔ 冒険者名</label>
        <input type="text" id="f-name" class="form-input" placeholder="例: アレン、ミア..." maxlength="20" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">🎭 職業</label>
        <select id="f-job" class="form-select">
          <option value="">── 職業を選択 ──</option>
          <option value="⚔️ 勇者">⚔️ 勇者</option>
          <option value="🗡️ 戦士">🗡️ 戦士</option>
          <option value="🧙 魔法使い">🧙 魔法使い</option>
          <option value="🏹 弓使い">🏹 弓使い</option>
          <option value="🛡️ 騎士">🛡️ 騎士</option>
          <option value="🗝️ 盗賊">🗝️ 盗賊</option>
          <option value="✨ 賢者">✨ 賢者</option>
          <option value="⚡ 魔導士">⚡ 魔導士</option>
          <option value="🌿 僧侶">🌿 僧侶</option>
          <option value="🔥 魔王">🔥 魔王</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">📜 自己紹介</label>
        <textarea id="f-bio" class="form-textarea" placeholder="冒険への想い、得意なことなど..." maxlength="150"></textarea>
        <div class="char-count"><span id="bio-count">0</span> / 150</div>
      </div>
      <button type="submit" class="submit-btn">📜 ギルドに登録する</button>
    </form>
  </div>

  <div id="result-section">
    <div class="success-title">🎉 登録完了！</div>
    <div class="success-sub">ようこそ、ギルドへ</div>
    <div class="adv-card">
      <div class="adv-rank">⭐ 新人冒険者 / RANK F</div>
      <div class="adv-icon" id="r-icon">⚔️</div>
      <div class="adv-name" id="r-name"></div>
      <div class="adv-job" id="r-job"></div>
      <hr class="adv-divider">
      <div class="adv-bio" id="r-bio"></div>
      <div class="adv-id" id="r-id"></div>
    </div>
    <div class="stars">★ ★ ★ 冒険の始まりだ！ ★ ★ ★</div>
    <a id="game-link" href="#" target="_blank" class="game-btn">⚔️ さあ、冒険を始めよう！</a>
    <a href="board.html" class="board-btn">🏰 ギルド本部へ行く</a>
    <button class="back-btn" onclick="resetForm()">← 別の冒険者を登録する</button>
  </div>
</div>

<script>
  const JOB_ICONS = {
    '⚔️ 勇者':'⚔️','🗡️ 戦士':'🗡️','🧙 魔法使い':'🧙',
    '🏹 弓使い':'🏹','🛡️ 騎士':'🛡️','🗝️ 盗賊':'🗝️',
    '✨ 賢者':'✨','⚡ 魔導士':'⚡','🌿 僧侶':'🌿','🔥 魔王':'🔥'
  };

  function goToBoard() {
    window.location.href = 'board.html';
  }

  // ページ読み込み時：既存プロフィールがあればバナー表示
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('guild_profile');
    if (saved) {
      try {
        const p = JSON.parse(saved);
        const banner = document.getElementById('existing-banner');
        document.getElementById('existing-text').textContent =
          `${p.name}（${p.job}）として登録済みです`;
        banner.style.display = 'flex';
        // フォームに既存値を復元
        document.getElementById('f-name').value = p.name || '';
        document.getElementById('f-job').value  = p.job  || '';
        document.getElementById('f-bio').value  = p.bio  || '';
        document.getElementById('bio-count').textContent = (p.bio || '').length;
      } catch(e) {}
    }
  });

  document.getElementById('f-bio').addEventListener('input', function() {
    document.getElementById('bio-count').textContent = this.value.length;
  });

  document.getElementById('reg-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('f-name').value.trim();
    const job  = document.getElementById('f-job').value;
    const bio  = document.getElementById('f-bio').value.trim();
    if (!name) { alert('冒険者名を入力してください'); return; }
    if (!job)  { alert('職業を選択してください'); return; }
    if (!bio)  { alert('自己紹介を入力してください'); return; }

    const id = 'ADV-' + Date.now().toString(36).toUpperCase();

    // localStorage に保存
    localStorage.setItem('guild_profile', JSON.stringify({
      name, job, bio, id,
      registeredAt: new Date().toISOString()
    }));

    document.getElementById('r-icon').textContent = JOB_ICONS[job] || '⚔️';
    document.getElementById('r-name').textContent = name;
    document.getElementById('r-job').textContent  = job;
    document.getElementById('r-bio').textContent  = '「' + bio + '」';
    document.getElementById('r-id').textContent   = 'ギルドID: ' + id;

    const params = new URLSearchParams({ name: name, bio: bio });
    document.getElementById('game-link').href =
      'https://kouta-project.onrender.com/?' + params.toString();

    document.getElementById('form-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';
  });

  function resetForm() {
    document.getElementById('reg-form').reset();
    document.getElementById('bio-count').textContent = '0';
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
  }
</script>
</body>
</html>
